<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Test Results</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1e293b;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #326ce5 0%, #0d47a1 100%);
            color: white;
            padding: 35px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 2.2em; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        .score-panel {
            background: white;
            padding: 40px;
            text-align: center;
            border-bottom: 3px solid #e2e8f0;
        }
        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .score-circle.pass { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; }
        .score-circle.fail { background: linear-gradient(135deg, #dc2626, #ef4444); color: white; }
        .score-percent { font-size: 3em; line-height: 1; }
        .score-label { font-size: 1em; opacity: 0.9; margin-top: 5px; }
        .result-verdict {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-verdict.pass { color: #16a34a; }
        .result-verdict.fail { color: #dc2626; }
        .result-subtitle { color: #64748b; margin-bottom: 25px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        .stat-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #1e293b; }
        .stat-label { font-size: 0.85em; color: #64748b; margin-top: 4px; }
        .domain-section {
            background: white;
            padding: 30px;
            border-bottom: 3px solid #e2e8f0;
        }
        .domain-section h2 { font-size: 1.4em; margin-bottom: 20px; color: #1e293b; }
        .domain-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .domain-name { font-weight: 600; min-width: 220px; color: #334155; font-size: 0.95em; }
        .domain-bar-wrap { flex: 1; background: #e2e8f0; border-radius: 10px; height: 12px; min-width: 100px; }
        .domain-bar { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
        .domain-score { font-weight: 700; min-width: 55px; text-align: right; font-size: 0.95em; }
        .review-section {
            background: white;
            padding: 30px;
        }
        .review-section h2 { font-size: 1.4em; margin-bottom: 20px; color: #1e293b; }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            color: #475569;
            transition: all 0.2s;
        }
        .filter-btn.active { background: #326ce5; color: white; border-color: #326ce5; }
        .review-card {
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 22px;
            margin-bottom: 18px;
            transition: all 0.2s;
        }
        .review-card.correct { border-color: #16a34a; background: #f0fdf4; }
        .review-card.incorrect { border-color: #dc2626; background: #fef2f2; }
        .review-card.skipped { border-color: #f59e0b; background: #fffbeb; }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .review-meta { display: flex; gap: 8px; flex-wrap: wrap; }
        .r-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.78em;
            font-weight: 700;
        }
        .badge-correct { background: #dcfce7; color: #166534; }
        .badge-incorrect { background: #fee2e2; color: #991b1b; }
        .badge-skipped { background: #fef9c3; color: #854d0e; }
        .badge-domain-r { background: #f3e8ff; color: #6b21a8; }
        .badge-type-r { background: #dbeafe; color: #1e40af; }
        .result-icon { font-size: 1.4em; }
        .review-question { font-weight: 600; color: #1e293b; margin-bottom: 12px; line-height: 1.5; }
        .answer-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 6px;
            font-size: 0.95em;
            flex-wrap: wrap;
        }
        .answer-label { font-weight: 700; min-width: 130px; color: #64748b; }
        .answer-value { color: #1e293b; }
        .answer-value.correct-val { color: #16a34a; font-weight: 600; }
        .answer-value.incorrect-val { color: #dc2626; font-weight: 600; }
        .explanation {
            background: #f1f5f9;
            border-left: 4px solid #326ce5;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 12px;
            font-size: 0.9em;
            color: #334155;
            line-height: 1.6;
        }
        .footer-actions {
            background: #1e3a5f;
            padding: 25px 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-radius: 0 0 20px 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 13px 30px;
            border-radius: 10px;
            border: none;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #326ce5, #0d47a1);
            color: white;
            box-shadow: 0 4px 12px rgba(50,108,229,0.3);
        }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn:hover { transform: translateY(-1px); }
        .no-results {
            text-align: center;
            padding: 60px;
            color: #64748b;
            background: white;
        }
        code {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<div id="k8s-auth-overlay" style="position:fixed;inset:0;background:rgba(15,32,39,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px);">
  <div style="background:#ffffff;border-radius:20px;padding:48px 44px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <img src="sourcefuse-logo.png" alt="SourceFuse" style="height:40px;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;" onerror="this.style.display='none'">
    <div style="font-size:1.4rem;font-weight:800;color:#0f172a;margin-bottom:8px;">Kubernetes Basic Course</div>
    <p style="font-size:0.95rem;color:#64748b;margin-bottom:28px;line-height:1.6;">Sign in with your SourceFuse Google account to view your results.</p>
    <button id="k8s-google-btn" style="display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#2563EB;color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:0.95rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.35);transition:all .2s;">
      <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      Sign in with Google
    </button>
    <div style="margin:16px 0 14px;color:#9ca3af;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;">OR</div>
    <input id="k8s-ep-email" type="email" placeholder="you@sourcefuse.com" autocomplete="email" style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:11px 13px;font-size:0.9rem;margin-bottom:8px;outline:none;font-family:inherit;color:#111827;background:#fff;display:block;box-sizing:border-box;">
    <input id="k8s-ep-password" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:11px 13px;font-size:0.9rem;margin-bottom:8px;outline:none;font-family:inherit;color:#111827;background:#fff;display:block;box-sizing:border-box;">
    <button onclick="k8sEmailSignIn()" style="width:100%;background:#2563EB;color:#fff;border:none;border-radius:12px;padding:13px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;">Sign in with Email</button>
    <div id="k8s-auth-error" style="display:none;font-size:0.82rem;color:#dc2626;background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:8px 12px;margin-top:10px;"></div>
  </div>
</div>

<div class="container">
    <div class="header">
        <h1>⎈ Kubernetes Test Results</h1>
        <p id="headerSubtitle">Basic Level — CKA Foundation</p>
    </div>
    <div id="resultsContent"></div>
    <div class="footer-actions">
        <button class="btn btn-secondary" onclick="window.print()">🖨 Print Results</button>
        <button class="btn btn-primary" onclick="retakeTest()">🔄 Retake Test</button>
    </div>
</div>

<script>
    const data = JSON.parse(localStorage.getItem('k8s_test_results') || 'null');

    if (!data) {
        document.getElementById('resultsContent').innerHTML = `
            <div class="no-results">
                <h2>No results found</h2>
                <p style="margin-top:10px">Please complete the test first.</p>
                <button class="btn btn-primary" style="margin-top:20px" onclick="window.location.href='kubernetes-basic-test.html'">Go to Test</button>
            </div>`;
    } else {
        renderResults(data);
    }

    function renderResults(data) {
        const { questions, answers, timeTaken } = data;
        let correct = 0, incorrect = 0, skipped = 0;
        const domainStats = {};

        questions.forEach((q, i) => {
            const domain = q.domain;
            if (!domainStats[domain]) domainStats[domain] = { correct: 0, total: 0 };
            domainStats[domain].total++;

            const userAnswer = answers[i];
            if (!userAnswer) { skipped++; return; }

            let isCorrect = false;
            if (q.type === 'fill') {
                isCorrect = userAnswer.trim().toLowerCase() === q.answer.toLowerCase();
            } else {
                isCorrect = userAnswer === q.answer;
            }

            if (isCorrect) { correct++; domainStats[domain].correct++; }
            else incorrect++;
        });

        const total = questions.length;
        const score = Math.round((correct / total) * 100);
        const passed = score >= 66;

        const domainColors = {
            'Cluster Architecture': '#326ce5',
            'Workloads & Scheduling': '#059669',
            'Services & Networking': '#d97706',
            'Storage': '#7c3aed',
            'Troubleshooting': '#dc2626'
        };

        let allCardsHTML = '';
        let currentFilter = 'all';

        function buildCards(filter) {
            return questions.map((q, i) => {
                const userAnswer = answers[i];
                let isCorrect = false;
                let status = 'skipped';

                if (userAnswer) {
                    if (q.type === 'fill') {
                        isCorrect = userAnswer.trim().toLowerCase() === q.answer.toLowerCase();
                    } else {
                        isCorrect = userAnswer === q.answer;
                    }
                    status = isCorrect ? 'correct' : 'incorrect';
                }

                if (filter !== 'all' && filter !== status) return '';

                const icon = status === 'correct' ? '✅' : status === 'incorrect' ? '❌' : '⚠️';
                const badgeClass = `badge-${status}`;
                const badgeText = status.charAt(0).toUpperCase() + status.slice(1);

                let userDisplay = userAnswer || '<em>Not answered</em>';
                let correctDisplay = q.answer;

                const userClass = isCorrect ? 'correct-val' : (userAnswer ? 'incorrect-val' : '');

                return `
                    <div class="review-card ${status}">
                        <div class="review-header">
                            <div class="review-meta">
                                <span class="r-badge ${badgeClass}">${badgeText}</span>
                                <span class="r-badge badge-domain-r">${q.domain}</span>
                                <span class="r-badge badge-type-r">${q.type.toUpperCase()}</span>
                            </div>
                            <span class="result-icon">${icon}</span>
                        </div>
                        <div class="review-question">Q${i+1}. ${q.question}</div>
                        <div class="answer-row">
                            <span class="answer-label">Your Answer:</span>
                            <span class="answer-value ${userClass}">${userDisplay}</span>
                        </div>
                        <div class="answer-row">
                            <span class="answer-label">Correct Answer:</span>
                            <span class="answer-value correct-val">${correctDisplay}</span>
                        </div>
                        <div class="explanation">💡 ${q.explanation}</div>
                    </div>
                `;
            }).join('');
        }

        const domainRowsHTML = Object.entries(domainStats).map(([domain, stats]) => {
            const pct = Math.round((stats.correct / stats.total) * 100);
            const color = domainColors[domain] || '#326ce5';
            return `
                <div class="domain-row">
                    <div class="domain-name">${domain}</div>
                    <div class="domain-bar-wrap">
                        <div class="domain-bar" style="width:${pct}%; background:${color}"></div>
                    </div>
                    <div class="domain-score" style="color:${color}">${stats.correct}/${stats.total} (${pct}%)</div>
                </div>
            `;
        }).join('');

        document.getElementById('resultsContent').innerHTML = `
            <div class="score-panel">
                <div class="score-circle ${passed ? 'pass' : 'fail'}">
                    <div class="score-percent">${score}%</div>
                    <div class="score-label">${passed ? 'PASSED' : 'FAILED'}</div>
                </div>
                <div class="result-verdict ${passed ? 'pass' : 'fail'}">${passed ? '🎉 Congratulations!' : '📚 Keep Studying'}</div>
                <div class="result-subtitle">${passed ? 'You passed the Basic Level test!' : 'You need 66% to pass. Review the topics below.'}</div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-value" style="color:#16a34a">${correct}</div><div class="stat-label">Correct</div></div>
                    <div class="stat-box"><div class="stat-value" style="color:#dc2626">${incorrect}</div><div class="stat-label">Incorrect</div></div>
                    <div class="stat-box"><div class="stat-value" style="color:#f59e0b">${skipped}</div><div class="stat-label">Skipped</div></div>
                    <div class="stat-box"><div class="stat-value">${score}%</div><div class="stat-label">Score</div></div>
                    <div class="stat-box"><div class="stat-value" style="color:#326ce5">${timeTaken}</div><div class="stat-label">Time Taken</div></div>
                </div>
            </div>

            <div class="domain-section">
                <h2>📊 Score by Domain</h2>
                ${domainRowsHTML}
            </div>

            <div class="review-section">
                <h2>🔍 Question Review</h2>
                <div class="filter-bar">
                    <button class="filter-btn active" id="filter-all" onclick="applyFilter('all')">All (${total})</button>
                    <button class="filter-btn" id="filter-correct" onclick="applyFilter('correct')">✅ Correct (${correct})</button>
                    <button class="filter-btn" id="filter-incorrect" onclick="applyFilter('incorrect')">❌ Incorrect (${incorrect})</button>
                    <button class="filter-btn" id="filter-skipped" onclick="applyFilter('skipped')">⚠️ Skipped (${skipped})</button>
                </div>
                <div id="reviewCards">${buildCards('all')}</div>
            </div>
        `;

        window.applyFilter = function(filter) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + filter).classList.add('active');
            document.getElementById('reviewCards').innerHTML = buildCards(filter);
        };
    }

    function retakeTest() {
        localStorage.removeItem('k8s_test_results');
        window.location.href = 'kubernetes-basic-test.html';
    }
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const _K8S_CONFIG = {
    apiKey: "AIzaSyC-I-IOCq2fCwa471fsD5xOn6SYQSBDp7Q",
    authDomain: "sfcertification-grafana.firebaseapp.com",
    projectId: "sfcertification-grafana",
    storageBucket: "sfcertification-grafana.firebasestorage.app",
    messagingSenderId: "227322696511",
    appId: "1:227322696511:web:12e7ced7dd3d45fa06798a"
};
if (!window._k8sApp) window._k8sApp = firebase.initializeApp(_K8S_CONFIG, 'k8s');
const _k8sAuth = firebase.auth(window._k8sApp);

document.getElementById('k8s-google-btn').addEventListener('click', function() {
    _k8sAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e) {
        const el = document.getElementById('k8s-auth-error');
        el.textContent = e.message; el.style.display = 'block';
    });
});

window.k8sEmailSignIn = function() {
    const email  = (document.getElementById('k8s-ep-email').value    || '').trim().toLowerCase();
    const pwd    =  document.getElementById('k8s-ep-password').value  || '';
    const errEl  =  document.getElementById('k8s-auth-error');
    errEl.style.display = 'none';
    if (!email || !pwd) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
    if (!email.endsWith('@sourcefuse.com')) { errEl.textContent = 'Only @sourcefuse.com accounts are allowed.'; errEl.style.display = 'block'; return; }
    _k8sAuth.signInWithEmailAndPassword(email, pwd).catch(function(e) {
        errEl.textContent = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') ? 'Incorrect password.'
            : (e.code === 'auth/user-not-found') ? 'No account found for this email.' : e.message;
        errEl.style.display = 'block';
    });
};

_k8sAuth.onAuthStateChanged(async function(user) {
    if (user) {
        if (!user.email || !user.email.endsWith('@sourcefuse.com')) {
            document.getElementById('k8s-auth-error').textContent = 'Only @sourcefuse.com accounts are allowed.';
            document.getElementById('k8s-auth-error').style.display = 'block';
            await _k8sAuth.signOut(); return;
        }
        document.getElementById('k8s-auth-overlay').style.display = 'none';
    } else {
        document.getElementById('k8s-auth-overlay').style.display = 'flex';
    }
});
</script>
</body>
</html>
